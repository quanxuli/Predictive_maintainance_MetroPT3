<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metro-PT3 Predictive Maintenance Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="dashboard-container">
        <!-- Header -->
        <header class="header">
            <div class="logo-area">
                <div class="pulse-indicator" id="connection-status"></div>
                <h1>Metro-PT3 Live Dashboard</h1>
            </div>
            <div class="status-panel" id="system-status-panel">
                <div class="status-icon" id="system-status-icon"></div>
                <div class="status-text">
                    <span class="status-label">System Status</span>
                    <h2 id="system-status-value">LOADING...</h2>
                </div>
                <div class="confidence-container">
                    <span class="confidence-label">Anomaly Score (LSTM)</span>
                    <div class="confidence-bar-bg">
                        <div class="confidence-bar-fill" id="confidence-bar"></div>
                    </div>
                    <span class="confidence-value" id="confidence-value">--%</span>
                </div>
            </div>
        </header>

        <!-- KPI Cards -->
        <section class="kpi-grid">
            <div class="kpi-card">
                <h3>Last Update</h3>
                <p id="kpi-time">--:--:--</p>
            </div>
            <div class="kpi-card">
                <h3>Avg TP2 Pressure</h3>
                <p id="kpi-tp2">-- bar</p>
            </div>
            <div class="kpi-card">
                <h3>Avg TP3 Pressure</h3>
                <p id="kpi-tp3">-- bar</p>
            </div>
            <div class="kpi-card">
                <h3>Motor Current</h3>
                <p id="kpi-motor">-- A</p>
            </div>
        </section>

        <!-- Charts Area -->
        <section class="charts-grid">
            <div class="chart-card">
                <h3>Pressure Sensors (TP2 & TP3)</h3>
                <div class="chart-container">
                    <canvas id="pressureChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <h3>Motor Current</h3>
                <div class="chart-container">
                    <canvas id="motorChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <h3>Oil Temperature & Reservoirs</h3>
                <div class="chart-container">
                    <canvas id="tempChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <h3>H1 (Valve Status) & DV Pressure</h3>
                <div class="chart-container">
                    <canvas id="valveChart"></canvas>
                </div>
            </div>
        </section>
    </div>
    
    <script src="/static/app.js"></script>
</body>
</html>
